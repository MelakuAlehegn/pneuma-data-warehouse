name: dwh
version: "1.0.0"
config-version: 2

profile: dwh

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Defer cross-model tests (e.g. `relationships`) until every referenced model
# is either in the current selection or already built. Prevents test failures
# of the form "relation X does not exist" when models are run one at a time.
flags:
  indirect_selection: buildable

# Layered materialisation strategy. Override per-model where it matters.
#   staging      → view (cheap, always-fresh transformation of raw)
#   intermediate → ephemeral (inlined into downstream models; no physical table)
#   marts        → table (consumed by Metabase; fast to query)
models:
  dwh:
    +materialized: view
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: ephemeral
    marts:
      +schema: analytics
      +materialized: table

  # Elementary writes its run/test history models to their own schema. With our
  # generate_schema_name macro this resolves to `dbt_dev_elementary` in dev and
  # `elementary` in prod.
  elementary:
    +schema: elementary

vars:
  # Elementary inserts run metadata on every dbt invocation. Disable here only
  # if dbt itself is being called from a context where it shouldn't write.
  disable_elementary: false
