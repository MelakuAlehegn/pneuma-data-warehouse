name: dwh
version: "1.0.0"
config-version: 2

profile: dwh

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layered materialisation strategy. Override per-model where it matters.
#   staging      → view (cheap, always-fresh transformation of raw)
#   intermediate → ephemeral (inlined into downstream models; no physical table)
#   marts        → table (consumed by Metabase; fast to query)
models:
  dwh:
    +materialized: view
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: ephemeral
    marts:
      +schema: analytics
      +materialized: table
